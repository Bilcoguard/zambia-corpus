schema_version: "0.1"

# Zambian Authorities Corpus — Source Map
# Phase 0 deliverable. Planning only — no remote fetches performed.
# Every field marked "TBD — verify in Phase 2" must be confirmed by a live fetch
# under Phase 2 before being relied on. Non-negotiable rule #1 (no fabrication)
# applies: do not replace a TBD with a guess.
#
# Rate limits sourced from approvals.yaml:
#   default_seconds_between_requests: 2
#   zambialii_seconds_between_requests: 5
#   judiciary_seconds_between_requests: 5

sources:

  # ---------------------------------------------------------------------------
  # PRIMARY SOURCES (priority: high)
  # ---------------------------------------------------------------------------

  - id: parliament-zm
    name: Parliament of Zambia
    base_url: https://www.parliament.gov.zm
    robots_txt_url: https://www.parliament.gov.zm/robots.txt
    robots_txt_status: "unknown — to verify in Phase 2"
    content_types:
      - acts
      - bills
      - hansard
      - constitution
    url_patterns:
      listing: "TBD — verify in Phase 2"
      document: "TBD — verify in Phase 2"
    parser_strategy: pdf
    rate_limit_seconds: 2
    priority: high
    notes: >
      Authoritative for as-enacted Acts and Bills. Most outputs are expected to
      be PDFs; a small number of listing pages may be HTML. Confirm whether
      Acts are published as single PDFs or split by part. Check for a
      downloads index / publications page. Hansard is useful for legislative
      intent but is lower priority than Acts.

  - id: moj-laws-zm
    name: Ministry of Justice — Laws of Zambia (Cap compilation)
    base_url: "TBD — verify in Phase 2"
    robots_txt_url: "TBD — verify in Phase 2"
    robots_txt_status: "unknown — to verify in Phase 2"
    content_types:
      - acts
      - constitution
      - consolidated_laws
    url_patterns:
      listing: "TBD — verify in Phase 2"
      document: "TBD — verify in Phase 2"
    parser_strategy: pdf
    rate_limit_seconds: 2
    priority: high
    notes: >
      Canonical source for the Laws of Zambia Cap numbering system used in
      most judgment citations. Phase 2 must identify the authoritative host
      (Ministry of Justice or Government Printer). Do not assume a URL.

  - id: zambialii
    priority: high
    status: blocked
    robots_txt_status: reserved_content_signal
    reservation: "Content-Signal: ai-input=no; EU Directive 2019/790 Art. 4 reservation"
    reservation_observed_at: "2026-04-09"
    reservation_source: "raw/discovery/zambialii/robots.txt"
    notes: "Closed to KWLP corpus builder per Phase 2 Checkpoint A policy decision 2026-04-09. Do not fetch. Revisit only if ZambiaLII publishes a revised rights reservation."

  - id: judiciary-zm
    name: Judiciary of Zambia
    base_url: https://judiciary.gov.zm
    robots_txt_url: https://judiciary.gov.zm/robots.txt
    robots_txt_status: "unknown — to verify in Phase 2"
    content_types:
      - judgments
    url_patterns:
      listing: "TBD — verify in Phase 2"
      document: "TBD — verify in Phase 2"
    parser_strategy: pdf+ocr
    rate_limit_seconds: 5
    priority: high
    notes: >
      Covers Supreme Court (SCZ), Court of Appeal (CAZ), and High Court
      judgments. Expect PDFs, some scanned — OCR fallback will be needed.
      Confirm how judgments are indexed (by court / year / case number).
      Cross-check coverage against ZambiaLII to avoid double-ingesting the
      same judgment under two different IDs.

  - id: government-gazette
    name: Zambia Government Gazette
    base_url: "TBD — verify in Phase 2"
    robots_txt_url: "TBD — verify in Phase 2"
    robots_txt_status: "unknown — to verify in Phase 2"
    content_types:
      - sis
      - gazette
    url_patterns:
      listing: "TBD — verify in Phase 2"
      document: "TBD — verify in Phase 2"
    parser_strategy: pdf+ocr
    rate_limit_seconds: 2
    priority: high
    notes: >
      Needed for Statutory Instruments not yet mirrored on ZambiaLII. Phase 2
      must first identify the authoritative host (Government Printer /
      Ministry of Justice / a Gazette portal). Historical gazettes are likely
      scanned and will require OCR. Do NOT assume a URL — confirm by direct
      inspection before any ingest.

  # ---------------------------------------------------------------------------
  # REGULATOR SOURCES (priority: medium)
  # Subsidiary legislation, guidelines, directives. Base URLs deliberately
  # left TBD to avoid fabricating domains. Phase 2 opens each site from a
  # trusted starting point (e.g. gov.zm directory or a known brief) and then
  # captures the verified base URL and robots.txt.
  # ---------------------------------------------------------------------------

  - id: pacra
    name: Patents and Companies Registration Agency (PACRA)
    base_url: "TBD — verify in Phase 2"
    robots_txt_url: "TBD — verify in Phase 2"
    robots_txt_status: "unknown — to verify in Phase 2"
    content_types:
      - guidelines
      - directives
      - forms
    url_patterns:
      listing: "TBD — verify in Phase 2"
      document: "TBD — verify in Phase 2"
    parser_strategy: html
    rate_limit_seconds: 2
    priority: medium
    notes: >
      Primary interest: company / business name / IP registration guidelines
      and any subsidiary legislation or practice directions issued by PACRA.
      Cross-reference with the Companies Act 2017 (Phase 2 pilot target).

  - id: zra
