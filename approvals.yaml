      # Specific reason codes required when deferring a candidate.
      # Generic 'outcome_not_inferable_under_tightened_policy' is
      # banned for NEW deferrals (existing entries in gaps.md remain
      # for historical accuracy).
      - pdf_extraction_empty_likely_scanned
      - multi_judge_separate_opinions_no_clear_majority_disposition
      - parser_v0.3.1_token_unhandled
