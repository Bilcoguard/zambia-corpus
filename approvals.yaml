    reparse_first_note: |
      Before consuming any fresh fetch budget, the tick MUST scan
      gaps.md and records/judgments/ for candidates whose raw
      HTML+PDF are already on disk but whose record was never
      written, and re-parse them with the current parser version.
      Up to MAX_BATCH_SIZE per tick. Only when no addressable
      deferreds remain should the tick continue the fresh DESC
      sweep. RESOLVED-line append under the original gaps.md
      entry; never delete the entry.
